# Autotune config for the Move Policy DSL.
#
# Goal: let an LLM iteratively improve `policies/autotune/candidate.star` so
# that it solves benchmark kernels on the physical Gemini arch with the
# fewest move EVENTS (parallel move timesteps) while keeping
# success_rate == 1.0.
#
# Current focus: `steane_physical_35` — the only kernel in the suite where
# native Rust strategies show meaningful event-count differentiation
# (rust_entropy_20: 86, rust_entropy_10: 88, rust_entropy_5: 94,
#  rust_greedy: 100, rust_entropy_1: 104, rust_dfs: 106, rust_ids: 110,
#  rust_astar/rust_bfs: FAIL).
#
# The bridge that lets `dsl_autotune` plug into the benchmark harness lives
# at:
#   python/bloqade/lanes/heuristics/physical/movement.py
#       (RustPlacementTraversal.policy_path / policy_params / timeout_s)
#   python/benchmarks/harness/matrix.py
#       (StrategyConfig "dsl_autotune", reads $BLOQADE_DSL_POLICY)
#
# Measure pipeline:
#   1. autotune runs `scripts/autotune/measure_dsl_policy.py`, which invokes
#      `python -m benchmarks.cli --strategies dsl_autotune ...`, aggregates
#      the resulting CSV in-process, and prints
#      `AUTOTUNE_METRIC <name> <value>` lines to stdout.
#   2. RegexAdaptor extracts each metric value with a separate regex pattern.
#   3. WeightedSumScorer minimises `total_events` with `success_rate` as a
#      no-regression guardrail.
#
# The kernel list is controlled by $BLOQADE_DSL_KERNELS (set at launch);
# defaults to all 9 in the measure script.

[task]
name = "dsl-move-policy-ghz4"
description = "First-Keep run: get the LLM to produce *any* Move Policy DSL `.star` file that successfully solves `ghz_4` on the physical Gemini arch. Native strategies all solve ghz_4 in 14 events; the bar is just 'a policy that runs to completion without crashing'."
canonical_branch = "jason/move-policy-dsl"
max_iterations = "10"

# Any working policy on ghz_4 produces total_events <= 14 (native strategies
# all hit 14 events). Stop as soon as the LLM clears that bar — at that
# point `success_rate=1.0` and we have a Kept iteration whose policy file
# we can build on. The 30 ceiling gives slack for a working-but-suboptimal
# policy without false-positive Keeps.
[[task.target_metric]]
name = "total_events"
value = 30.0
direction = "Minimize"

[[task.target_metric]]
name = "success_rate"
value = 1.0
direction = "Maximize"

[paths]
# Glob form (matches both the exact file and any nested file under it).
# A literal relative path here was rejected by Claude CLI's path-scoped
# --allowedTools Edit:<path> matcher (separately fixed by the local
# autotune-implement patch that uses unscoped Edit/Write Allow).
tunable = ["policies/autotune/**"]

[[measure]]
name = "dsl_benchmark"
# Use `uv run` so the worktree's venv is used (the maturin-installed
# bloqade.lanes.bytecode._native module is what benchmarks.cli imports).
# `python` is NOT on PATH on this system — only `python3` and `uv`.
command = ["uv", "run", "python", "scripts/autotune/measure_dsl_policy.py"]
# steane_physical_35 with rust_entropy_5 takes ~600ms; LLM policies may
# be slower with retries/lookahead. 30 min keeps a margin.
timeout = 1800
adaptor = { type = "regex", patterns = [
    { name = "total_events", pattern = 'AUTOTUNE_METRIC total_events ([0-9.eE+\-]+)' },
    { name = "success_rate", pattern = 'AUTOTUNE_METRIC success_rate ([0-9.eE+\-]+)' },
    { name = "avg_events_solved", pattern = 'AUTOTUNE_METRIC avg_events_solved ([0-9.eE+\-]+)' },
    { name = "total_nodes_explored", pattern = 'AUTOTUNE_METRIC total_nodes_explored ([0-9.eE+\-]+)' },
    { name = "total_wall_time_ms", pattern = 'AUTOTUNE_METRIC total_wall_time_ms ([0-9.eE+\-]+)' },
    { name = "num_cases", pattern = 'AUTOTUNE_METRIC num_cases ([0-9.eE+\-]+)' },
    { name = "num_solved", pattern = 'AUTOTUNE_METRIC num_solved ([0-9.eE+\-]+)' },
] }

[score]
type = "weighted_sum"
primary_metrics = [
    { name = "total_events", direction = "Minimize", weight = 1.0 },
]
guardrail_metrics = [
    { name = "success_rate", direction = "Maximize", max_regression = 0.0 },
]
