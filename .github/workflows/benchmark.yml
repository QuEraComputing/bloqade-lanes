name: Benchmark

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    name: harness (${{ matrix.architecture }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        architecture: [logical, physical]

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: extractions/setup-just@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.5.1"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run benchmark harness (${{ matrix.architecture }})
        run: just benchmark-${{ matrix.architecture }}

      - name: Upload benchmark CSV
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-${{ matrix.architecture }}-csv
          path: python/benchmarks/harness/latest_${{ matrix.architecture }}.csv
          retention-days: 14
